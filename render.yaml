databases:
  - name: rovidev-saas-db
    plan: free
    databaseName: saas
    user: saas

services:
  - type: web
    name: rovidev-saas-starter
    runtime: node
    plan: free
    # Free plan has no preDeploy, so the schema is pushed and seeded during build.
    # db push (no migration history) + an idempotent upsert seed keep this safe to re-run.
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push && npm run db:seed && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rovidev-saas-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        value: https://rovidev-saas-starter.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_SCALE
        sync: false
