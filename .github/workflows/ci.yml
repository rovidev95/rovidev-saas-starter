name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy values so `prisma generate` and `next build` don't fail.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      AUTH_SECRET: ci-secret-ci-secret-ci-secret-32chars
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm install
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
